name: Scheduled Repo Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day. 
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  sync_with_upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Gives the action permission to push to your main branch
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main # This tells the action to pull your 'main' branch
          fetch-depth: 0 # Fetches all history so the merge is clean

      - name: Sync upstream changes
        run: |
          git remote add upstream https://github.com/vllm-project/vllm.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main
